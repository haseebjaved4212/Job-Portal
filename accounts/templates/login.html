{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="card auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="margin-bottom: 0.5rem;">Welcome Back</h1>
        <p style="color: var(--text-muted);">Log in to your Job Portal account</p>
    </div>
    <form method="post" style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">Log In</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
        <p style="color: var(--text-muted);">Don't have an account? <a href="{% url 'signup' %}" style="font-weight: 600;">Sign up</a></p>
    </div>
</div>
<style>
    .auth-card p { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem; font-weight: 600; }
    .auth-card input, .auth-card select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); transition: var(--transition); }
    .auth-card input:focus, .auth-card select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
</style>
{% endblock %}
