<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Portal{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        header { background-color: #007bff; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; margin-left: 1rem; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 2rem auto; padding: 1rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { padding: 2rem; border: 1px solid #ddd; border-radius: 8px; }
        button { background-color: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px; }
        .messages li.success { background-color: #d4edda; color: #155724; }
        .messages li.info { background-color: #d1ecf1; color: #0c5460; }
        .messages li.error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <div>
            <strong><a href="{% url 'job-list' %}" style="color: white; text-decoration: none; font-size: 1.5rem;">Job Portal</a></strong>
        </div>
        <nav>
            <a href="{% url 'job-list' %}">Jobs</a>
            {% if user.is_authenticated %}
                <a href="{% url 'job-create' %}">Post a Job</a>
                <a href="{% url 'my-jobs' %}">My Posted Jobs</a>
                <a href="{% url 'my-applications' %}">My Applications</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: white; cursor: pointer; padding: 0; margin-left: 1rem; font-size: 1rem;">Logout ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </nav>
    </header>
    
    <div class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
