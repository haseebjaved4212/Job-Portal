{% extends "base.html" %}
{% block title %}Delete Job{% endblock %}
{% block content %}
<div class="card">
    <h1>Delete "{{ object.title }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <p>Are you sure you want to delete this job posting?</p>
        <button type="submit">Yes, delete</button>
    </form>
</div>
{% endblock %}
