{% extends "base.html" %}
{% block title %}Delete Job{% endblock %}
{% block content %}
<div class="card auth-card" style="text-align: center;">
    <div style="margin-bottom: 2rem;">
        <h1 style="color: var(--danger); margin-bottom: 1rem;">Delete "{{ object.title }}"?</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Are you sure you want to permanently delete this job posting? This action cannot be undone.</p>
    </div>
    <form method="post" style="display: flex; gap: 1rem;">
        {% csrf_token %}
        <a href="{% url 'job-detail' object.pk %}" class="btn btn-outline" style="flex: 1;">Cancel</a>
        <button type="submit" class="btn btn-danger" style="flex: 1;">Yes, delete it</button>
    </form>
</div>
{% endblock %}
