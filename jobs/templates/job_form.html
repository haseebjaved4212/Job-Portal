{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}Update Job{% else %}Post a Job{% endif %}{% endblock %}
{% block content %}
<div class="card">
    <h1>{% if form.instance.pk %}Update Job{% else %}Post a Job{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
</div>
{% endblock %}
